name: CI

on:
  push:
    branches: [main, master, feature/**]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

      - name: Build server
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o web-scraper .

      - name: Build CLI
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o goscraper ./cmd/goscraper

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: web-scraper:ci
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
